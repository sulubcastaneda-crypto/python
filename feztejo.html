name=felicitacion_avanzada.html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎂 Generador Avanzado de Cumpleaños 🎂</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-primario: #667eea;
            --color-secundario: #764ba2;
            --color-acento: #f093fb;
            --color-pastel: #FF69B4;
            --color-fondo: #667eea;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--color-fondo) 0%, var(--color-secundario) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .contenedor-principal {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            max-width: 1200px;
            width: 100%;
        }

        /* SECCIÓN DE FORMULARIO */
        .formulario-seccion {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.2);
            animation: deslizarIzquierda 0.6s ease-out;
        }

        @keyframes deslizarIzquierda {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .formulario-seccion h2 {
            color: var(--color-primario);
            margin-bottom: 25px;
            font-size: 1.8em;
        }

        .grupo-input {
            margin-bottom: 20px;
        }

        .grupo-input label {
            display: block;
            color: var(--color-secundario);
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        .grupo-input input,
        .grupo-input select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .grupo-input input:focus,
        .grupo-input select:focus {
            outline: none;
            border-color: var(--color-primario);
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.3);
            background-color: #f8f9ff;
        }

        .opciones-pastel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .checkbox-custom {
            position: relative;
        }

        .checkbox-custom input {
            display: none;
        }

        .checkbox-custom label {
            display: block;
            padding: 12px;
            background: #f5f5f5;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
            margin-bottom: 0;
        }

        .checkbox-custom input:checked + label {
            background: var(--color-primario);
            color: white;
            border-color: var(--color-primario);
        }

        .botones-grupo {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 25px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-generar {
            background: linear-gradient(135deg, var(--color-primario), var(--color-secundario));
            color: white;
            grid-column: 1 / -1;
        }

        .btn-generar:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-generar:active {
            transform: translateY(-1px);
        }

        .btn-reiniciar {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #e0e0e0;
        }

        .btn-reiniciar:hover {
            background: #e0e0e0;
        }

        /* SECCIÓN DE VISUALIZACIÓN */
        .visualizacion-seccion {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: deslizarDerecha 0.6s ease-out;
            position: relative;
            overflow: hidden;
            min-height: 600px;
        }

        @keyframes deslizarDerecha {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .confeti-fondo {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .particula-confeti {
            position: absolute;
            pointer-events: none;
        }

        .visualizacion-contenido {
            position: relative;
            z-index: 1;
            text-align: center;
            width: 100%;
        }

        .titulo-felicitacion {
            font-size: 2.5em;
            color: var(--color-primario);
            margin-bottom: 15px;
            animation: saltoTitulo 0.8s ease-out;
        }

        @keyframes saltoTitulo {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .nombre-persona {
            font-size: 2.2em;
            color: var(--color-secundario);
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .edad-display {
            font-size: 1.3em;
            color: var(--color-acento);
            margin-bottom: 30px;
            font-weight: 600;
        }

        /* PASTEL INTERACTIVO */
        .pastel-contenedor {
            perspective: 1000px;
            margin: 30px 0;
            animation: aparecer 0.6s ease-out 0.2s both;
        }

        @keyframes aparecer {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .velas-grupo {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            min-height: 60px;
        }

        .vela-wrapper {
            position: relative;
            width: 20px;
            height: 60px;
        }

        .vela {
            width: 10px;
            height: 40px;
            background: linear-gradient(180deg, #FFD700 0%, #FFA500 100%);
            border-radius: 5px;
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
            animation: parpadearvela 0.6s ease-in-out infinite;
        }

        .llama {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            animation: parpadeofuego 0.4s ease-in-out infinite;
        }

        @keyframes parpadearvela {
            0%, 100% {
                box-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
            }
            50% {
                box-shadow: 0 0 25px rgba(255, 165, 0, 1);
            }
        }

        @keyframes parpadeofuego {
            0%, 100% {
                opacity: 1;
                filter: drop-shadow(0 0 5px orange);
            }
            50% {
                opacity: 0.7;
                filter: drop-shadow(0 0 10px red);
            }
        }

        .pastel-3d {
            width: 220px;
            height: 130px;
            margin: 0 auto;
            position: relative;
            transform-style: preserve-3d;
            animation: rotar 8s infinite linear;
        }

        @keyframes rotar {
            0% {
                transform: rotateY(0deg);
            }
            100% {
                transform: rotateY(360deg);
            }
        }

        .capa-pastel {
            width: 220px;
            height: 50px;
            margin: 0 auto;
            border-radius: 15px;
            position: relative;
            border: 3px solid rgba(255, 105, 180, 0.5);
            box-shadow: inset 0 2px 5px rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9em;
            font-weight: bold;
            color: white;
        }

        .capa-1 {
            background: linear-gradient(180deg, #FFB6C1 0%, #FF69B4 100%);
            z-index: 3;
        }

        .capa-2 {
            background: linear-gradient(180deg, #FF69B4 0%, #FF1493 100%);
            margin-top: -15px;
            z-index: 2;
            opacity: 0.9;
        }

        .capa-3 {
            background: linear-gradient(180deg, #FF1493 0%, #C71585 100%);
            margin-top: -15px;
            z-index: 1;
            opacity: 0.85;
        }

        .base-pastel {
            width: 240px;
            height: 25px;
            background: linear-gradient(180deg, #8B4513 0%, #654321 100%);
            border-radius: 0 0 15px 15px;
            margin: 0 auto;
            border: 3px solid #654321;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .decoraciones-pastel {
            position: absolute;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 5px 0;
            color: #FFD700;
            font-size: 1.2em;
            animation: parpadearDecoraciones 0.8s ease-in-out infinite;
        }

        @keyframes parpadearDecoraciones {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
        }

        .globos {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .globo {
            width: 40px;
            height: 55px;
            border-radius: 50% 50% 50% 0;
            position: relative;
            animation: flotarGlobo 2s ease-in-out infinite;
        }

        .globo-rojo {
            background: linear-gradient(135deg, #FF6B6B, #FF5252);
        }

        .globo-azul {
            background: linear-gradient(135deg, #4ECDC4, #45B7AA);
            animation-delay: 0.3s;
        }

        .globo-amarillo {
            background: linear-gradient(135deg, #FFE66D, #FFD700);
            animation-delay: 0.6s;
        }

        .globo-verde {
            background: linear-gradient(135deg, #95E1D3, #7FD8BE);
            animation-delay: 0.9s;
        }

        .globo-morado {
            background: linear-gradient(135deg, #F38181, #E85D75);
            animation-delay: 1.2s;
        }

        .globo::before {
            content: '';
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 25px;
            background: #333;
        }

        @keyframes flotarGlobo {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-25px);
            }
        }

        .mensaje-felicitacion {
            margin-top: 30px;
            color: #333;
            font-size: 1.1em;
            line-height: 1.8;
            animation: aparecer 0.6s ease-out 0.4s both;
        }

        .mensaje-felicitacion p {
            margin: 10px 0;
        }

        .corazon-latido {
            display: inline-block;
            color: #FF1493;
            animation: latir 0.6s ease-in-out infinite;
            margin: 0 5px;
        }

        @keyframes latir {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.3);
            }
        }

        /* RESPONSIVO */
        @media (max-width: 1024px) {
            .contenedor-principal {
                grid-template-columns: 1fr;
            }

            .visualizacion-seccion {
                min-height: 500px;
            }
        }

        @media (max-width: 600px) {
            .formulario-seccion,
            .visualizacion-seccion {
                padding: 20px;
            }

            .titulo-felicitacion {
                font-size: 2em;
            }

            .nombre-persona {
                font-size: 1.8em;
            }

            .opciones-pastel {
                grid-template-columns: 1fr;
            }

            .botones-grupo {
                grid-template-columns: 1fr;
            }

            .pastel-3d {
                width: 180px;
            }

            .capa-pastel {
                width: 180px;
            }

            .base-pastel {
                width: 200px;
            }

            .globos {
                gap: 10px;
            }
        }

        .oculto {
            display: none;
        }

        .mensaje-validacion {
            color: #e74c3c;
            font-size: 0.9em;
            margin-top: 5px;
            display: none;
        }

        .mensaje-validacion.mostrar {
            display: block;
        }
    </style>
</head>
<body>
    <div class="contenedor-principal">
        <!-- FORMULARIO -->
        <div class="formulario-seccion">
            <h2>🎉 Configurar Celebración</h2>

            <div class="grupo-input">
                <label for="nombre">Nombre de la persona</label>
                <input type="text" id="nombre" placeholder="Ingresa el nombre..." maxlength="30">
                <div class="mensaje-validacion" id="validNombre"></div>
            </div>

            <div class="grupo-input">
                <label for="edad">Edad a cumplir</label>
                <input type="number" id="edad" placeholder="Ingresa la edad..." min="1" max="120">
            </div>

            <div class="grupo-input">
                <label>Sabor del pastel</label>
                <select id="sabor">
                    <option value="fresa">🍓 Fresa</option>
                    <option value="chocolate">🍫 Chocolate</option>
                    <option value="vainilla">🧁 Vainilla</option>
                    <option value="frutos">🍓 Frutos Rojos</option>
                </select>
            </div>

            <div class="grupo-input">
                <label>Decoraciones del pastel</label>
                <div class="opciones-pastel">
                    <div class="checkbox-custom">
                        <input type="checkbox" id="choco" value="choco">
                        <label for="choco">🍫 Chocolate</label>
                    </div>
                    <div class="checkbox-custom">
                        <input type="checkbox" id="caramelo" value="caramelo">
                        <label for="caramelo">🍬 Caramelo</label>
                    </div>
                    <div class="checkbox-custom">
                        <input type="checkbox" id="frutas" value="frutas">
                        <label for="frutas">🍓 Frutas</label>
                    </div>
                    <div class="checkbox-custom">
                        <input type="checkbox" id="estrellas" value="estrellas">
                        <label for="estrellas">⭐ Estrellas</label>
                    </div>
                </div>
            </div>

            <div class="grupo-input">
                <label>Cantidad de velas</label>
                <input type="number" id="velas" value="5" min="1" max="50">
            </div>

            <div class="botones-grupo">
                <button class="btn-generar" onclick="generarFelicitacion()">✨ Generar Felicitación</button>
                <button class="btn-reiniciar" onclick="reiniciar()">↻ Reiniciar</button>
            </div>
        </div>

        <!-- VISUALIZACIÓN -->
        <div class="visualizacion-seccion">
            <div class="confeti-fondo" id="confetiFondo"></div>

            <div class="visualizacion-contenido" id="contenidoVacio">
                <h2 style="color: #999; font-size: 1.2em; margin-top: 50px;">👈 Completa el formulario para ver la felicitación</h2>
            </div>

            <div class="visualizacion-contenido oculto" id="contenidoFelicitacion">
                <div class="titulo-felicitacion">¡FELIZ CUMPLEAÑOS!</div>
                <div class="nombre-persona" id="nombreMostrado"></div>
                <div class="edad-display" id="edadDisplay"></div>

                <div class="globos">
                    <div class="globo globo-rojo"></div>
                    <div class="globo globo-azul"></div>
                    <div class="globo globo-amarillo"></div>
                    <div class="globo globo-verde"></div>
                    <div class="globo globo-morado"></div>
                </div>

                <div class="pastel-contenedor">
                    <div class="velas-grupo" id="velasContenedor"></div>

                    <div class="pastel-3d">
                        <div class="capa-pastel capa-1">
                            <div class="decoraciones-pastel" id="decoraciones"></div>
                        </div>
                        <div class="capa-pastel capa-2"></div>
                        <div class="capa-pastel capa-3"></div>
                        <div class="base-pastel"></div>
                    </div>
                </div>

                <div class="mensaje-felicitacion">
                    <p>Que disfrutes tu día especial,</p>
                    <p>rodeado de <span class="corazon-latido">❤️</span> amor y <span class="corazon-latido">❤️</span> alegría</p>
                    <p style="margin-top: 20px; font-style: italic; color: var(--color-acento);">✨ Que todos tus sueños se hagan realidad ✨</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const mensajesEspeciales = [
            "Que todos tus deseos se hagan realidad",
            "Espero que este sea tu mejor año",
            "Que la vida te sorprenda con momentos hermosos",
            "¡A disfrutar cada momento especial!",
            "Brilla con luz propia siempre",
            "¡Que sea un año lleno de aventuras!"
        ];

        const decoracionesPastel = {
            choco: '🍫',
            caramelo: '🍬',
            frutas: '🍓',
            estrellas: '⭐'
        };

        function validarFormulario() {
            const nombre = document.getElementById('nombre').value.trim();
            const msgValidacion = document.getElementById('validNombre');

            if (!nombre) {
                msgValidacion.textContent = 'El nombre es requerido';
                msgValidacion.classList.add('mostrar');
                return false;
            }

            if (nombre.length < 2) {
                msgValidacion.textContent = 'El nombre debe tener al menos 2 caracteres';
                msgValidacion.classList.add('mostrar');
                return false;
            }

            msgValidacion.classList.remove('mostrar');
            return true;
        }

        function generarFelicitacion() {
            if (!validarFormulario()) {
                return;
            }

            const nombre = document.getElementById('nombre').value.trim();
            const edad = document.getElementById('edad').value;
            const velas = document.getElementById('velas').value || 5;

            // Actualizar contenido
            document.getElementById('nombreMostrado').textContent = nombre.toUpperCase();
            
            if (edad) {
                document.getElementById('edadDisplay').innerHTML = 
                    `¡${nombre} está cumpliendo <strong>${edad} años!</strong>`;
            } else {
                document.getElementById('edadDisplay').innerHTML = 
                    `¡Que disfrutes tu día especial!`;
            }

            // Generar velas
            generarVelas(parseInt(velas));

            // Generar decoraciones
            generarDecoraciones();

            // Generar confeti
            generarConfeti();

            // Mostrar felicitación
            document.getElementById('contenidoVacio').classList.add('oculto');
            document.getElementById('contenidoFelicitacion').classList.remove('oculto');
        }

        function generarVelas(cantidad) {
            const contenedor = document.getElementById('velasContenedor');
            contenedor.innerHTML = '';

            for (let i = 0; i < cantidad; i++) {
                const wrapper = document.createElement('div');
                wrapper.className = 'vela-wrapper';

                const vela = document.createElement('div');
                vela.className = 'vela';
                vela.style.animationDelay = `${i * 0.1}s`;

                const llama = document.createElement('div');
                llama.className = 'llama';
                llama.textContent = '🔥';
                llama.style.animationDelay = `${i * 0.1}s`;

                wrapper.appendChild(llama);
                wrapper.appendChild(vela);
                contenedor.appendChild(wrapper);
            }
        }

        function generarDecoraciones() {
            const decoracionesDiv = document.getElementById('decoraciones');
            decoracionesDiv.innerHTML = '';

            const decoracionesSeleccionadas = [];
            for (let key in decoracionesPastel) {
                if (document.getElementById(key).checked) {
                    decoracionesSeleccionadas.push(decoracionesPastel[key]);
                }
            }

            if (decoracionesSeleccionadas.length === 0) {
                decoracionesSeleccionadas.push('✨');
            }

            for (let i = 0; i < 5; i++) {
                const dec = document.createElement('span');
                dec.textContent = decoracionesSeleccionadas[i % decoracionesSeleccionadas.length];
                decoracionesDiv.appendChild(dec);
            }
        }

        function generarConfeti() {
            const contenedor = document.getElementById('confetiFondo');
            contenedor.innerHTML = '';

            const colores = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#95E1D3', '#F38181', '#AA96DA'];

            for (let i = 0; i < 30; i++) {
                const particula = document.createElement('div');
                particula.className = 'particula-confeti';
                particula.style.left = Math.random() * 100 + '%';
                particula.style.background = colores[Math.floor(Math.random() * colores.length)];
                particula.style.width = (Math.random() * 10 + 5) + 'px';
                particula.style.height = particula.style.width;
                particula.style.borderRadius = '50%';
                particula.style.animation = `caerConfeti ${Math.random() * 2 + 2}s ease-in forwards`;
                particula.style.animationDelay = (Math.random() * 0.5) + 's';
                particula.style.opacity = Math.random() * 0.7 + 0.3;

                contenedor.appendChild(particula);
            }
        }

        function reiniciar() {
            document.getElementById('nombre').value = '';
            document.getElementById('edad').value = '';
            document.getElementById('velas').value = '5';
            document.getElementById('sabor').value = 'fresa';
            document.getElementById('choco').checked = false;
            document.getElementById('caramelo').checked = false;
            document.getElementById('frutas').checked = false;
            document.getElementById('estrellas').checked = false;

            document.getElementById('contenidoVacio').classList.remove('oculto');
            document.getElementById('contenidoFelicitacion').classList.add('oculto');
            document.getElementById('nombre').focus();
        }

        // Permitir Enter en campos
        document.getElementById('nombre').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') generarFelicitacion();
        });

        document.getElementById('edad').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') generarFelicitacion();
        });

        // Animación CSS para confeti
        const style = document.createElement('style');
        style.textContent = `
            @keyframes caerConfeti {
                0% {
                    transform: translateY(-10px) rotate(0deg);
                    opacity: 1;
                }
                100% {
                    transform: translateY(400px) rotate(720deg);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
